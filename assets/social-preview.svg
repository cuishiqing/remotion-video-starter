<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Gradient circles -->
  <circle cx="100" cy="100" r="200" fill="url(#grad1)" opacity="0.3"/>
  <circle cx="1100" cy="530" r="200" fill="url(#grad2)" opacity="0.3"/>

  <!-- Definitions -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Video icon -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="320" height="200" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
    <circle cx="160" cy="100" r="40" fill="url(#grad1)"/>
    <polygon points="145,85 145,115 180,100" fill="#0a0a0a"/>
  </g>

  <!-- Text -->
  <text x="500" y="200" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">
    Remotion Video Starter
  </text>

  <text x="500" y="260" font-family="Arial, sans-serif" font-size="24" fill="#888">
    Complete video production automation skill
  </text>

  <text x="500" y="320" font-family="Arial, sans-serif" font-size="20" fill="#666">
    🎬 9-step workflow • 🎯 Auto analysis • 🔊 TTS generation
  </text>

  <!-- Features -->
  <g transform="translate(500, 380)">
    <rect x="0" y="0" width="180" height="40" rx="8" fill="#1a1a1a"/>
    <text x="90" y="26" font-family="Arial, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">
      ✅ Remotion
    </text>
  </g>

  <g transform="translate(700, 380)">
    <rect x="0" y="0" width="180" height="40" rx="8" fill="#1a1a1a"/>
    <text x="90" y="26" font-family="Arial, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">
      ✅ Claude Skills
    </text>
  </g>

  <g transform="translate(920, 380)">
    <rect x="0" y="0" width="180" height="40" rx="8" fill="#1a1a1a"/>
    <text x="90" y="26" font-family="Arial, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">
      ✅ Gemini AI
    </text>
  </g>

  <!-- Footer -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="16" fill="#444" text-anchor="middle">
    github.com/cuishiqing/remotion-video-starter
  </text>

  <text x="600" y="560" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">
    By Abu + Claude • MIT License
  </text>
</svg>
